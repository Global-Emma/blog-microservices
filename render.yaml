envVarGroups:
  - name: blog-backend-secrets
    envVars:
      - key: MONGO_URI
        sync: false # Pasted securely in the Render Dashboard -> Env Groups
      - key: RABBIT_MQ
        sync: false # Pasted securely in the Render Dashboard -> Env Groups

services:
  # 1. Public API Gateway (The public-facing entry point)
  - type: web
    name: api-gateway
    runtime: docker
    plan: free
    dockerfilePath: ./api-gateway/Dockerfile
    dockerContext: ./api-gateway
    envVars:
      - key: PORT
        value: "3000"
      - fromGroup: blog-backend-secrets
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: blog-redis
          property: connectionString
      - key: AUTH_SERVICE_URL
        value: http://auth-service:4000
      - key: POST_SERVICE_URL
        value: http://post-service:6000
      - key: COMMENT_SERVICE_URL
        value: http://comment-service:5000
      - key: MEDIA_SERVICE_URL
        value: http://media-service:8000

  # 2. Private Auth Service
  - type: pserv
    name: auth-service
    runtime: docker
    plan: free
    dockerfilePath: ./auth-service/Dockerfile
    dockerContext: ./auth-service
    envVars:
      - key: PORT
        value: "4000"
      - fromGroup: blog-backend-secrets
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: blog-redis
          property: connectionString

  # 3. Private Post Service
  - type: pserv
    name: post-service
    runtime: docker
    plan: free
    dockerfilePath: ./post-service/Dockerfile
    dockerContext: ./post-service
    envVars:
      - key: PORT
        value: "6000"
      - fromGroup: blog-backend-secrets
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: blog-redis
          property: connectionString

  # 4. Private Media Service
  - type: pserv
    name: media-service
    runtime: docker
    plan: free
    dockerfilePath: ./media-service/Dockerfile
    dockerContext: ./media-service
    envVars:
      - key: PORT
        value: "8000"
      - fromGroup: blog-backend-secrets
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: blog-redis
          property: connectionString

  # 5. Private Comment Service
  - type: pserv
    name: comment-service
    runtime: docker
    plan: free
    dockerfilePath: ./comment-service/Dockerfile
    dockerContext: ./comment-service
    envVars:
      - key: PORT
        value: "5000"
      - fromGroup: blog-backend-secrets
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: blog-redis
          property: connectionString

  # 6. Internal Redis Instance
  - type: keyvalue
    name: blog-redis
    plan: free
    ipAllowList: []